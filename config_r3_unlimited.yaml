# Run 3 unlimited: BOTH sides thinking, no token caps (up to server context=49152),
# no total-request timeout (streaming adapter handles idle detection).

run:
  name: phase3_thinking_unlimited
  trace_dir: traces
  tasks_dir: tasks_r3_sweet

models:
  model_a:
    endpoint: http://127.0.0.1:8080/v1
    served_name: qwen3.6-35b-a3b
    thinking_default: true
  model_b:
    endpoint: http://127.0.0.1:8081/v1
    served_name: gemma-4-26b-a4b
    thinking_default: true

baseline:
  model: model_a
  temperature: 0.7
  max_tokens: 32000              # effectively unlimited given prompt ~ 400 tokens
  thinking: true

search:
  non_verifiable:
    proposals_per_model: 6
    post_score_keep: 3
  verifiable:
    proposals_per_model: 6

sampling:
  strategies:
    - baseline
    - decompose-first
    - edge-case-first
    - brevity
  temperatures: [0.3, 0.7, 1.0]
  top_p: 0.95
  # Context is 49152 total / 6 concurrent slots ≈ 8192 per slot before overflow.
  # Keeping each concurrent request under that bound prevents "Context size exceeded" cancellations.
  proposal_max_tokens: 7000
  eval_max_tokens: 4000
  final_max_tokens: 7000

scoring:
  non_verifiable:
    cross_eval_weight: 0.83
    self_eval_weight: 0.17
    self_eval_enabled: false
  verifiable:
    deterministic_weight: 0.70
    cross_eval_weight: 0.25
    self_eval_weight: 0.05
    self_eval_enabled: false

disagreement:
  tau: 0.25

repair:
  enabled: true
  max_to_repair: 4
  max_tokens: 6000
  viability_floor: 0.1
  auto_disable_if_noop_rate_above: 0.5

short_circuit:
  enabled: false

judge_calibration:
  weights:
    model_a: 1.0
    model_b: 0.6
  min_consistency_for_full_weight: 0.8
  non_unanimous_penalty: 0.5

synthesis:
  model: model_a
  thinking: true
  temperature: 0.5
